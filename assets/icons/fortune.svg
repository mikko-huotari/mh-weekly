<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="44" fill="#FFFFFF" stroke="#111111" stroke-width="8"/>
  <!-- vertical stem (black) -->
  <rect x="34" y="26" width="14" height="48" fill="#111111"/>
  <!-- top arm: yellow block + teal triangle -->
  <rect x="34" y="26" width="15" height="15" fill="#F2C200"/>
