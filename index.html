<html lang="en">
<head>

<meta name="description" content="Mikko Huotari's weekly China brief, archived. One issue per week." />
<meta name="robots" content="noindex,nofollow" />
<meta name="googlebot" content="noindex,nofollow" />

<meta name="theme-color" content="#E8412B" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/app/favicon-32.png" />
<link rel="apple-touch-icon" href="assets/icons/app/apple-touch-icon.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />

    });
  }
</script>

<style>
  /* ------------------------------------------------------------------ */
  /* Type — Neo Sans Pro for chrome/headings, serif for body            */
  /* ------------------------------------------------------------------ */
  @font-face {
    font-family: "Neo Sans Pro";
    src: url("fonts/NeoSansPro-Light.otf") format("opentype");
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Neo Sans Pro";
    src: url("fonts/NeoSansPro-Regular.otf") format("opentype");
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Neo Sans Pro";
    src: url("fonts/NeoSansPro-Italic.otf") format("opentype");
    font-weight: 400; font-style: italic; font-display: swap;
  }
  @font-face {
    font-family: "Neo Sans Pro";
    src: url("fonts/NeoSansPro-Medium.otf") format("opentype");
    font-weight: 500; font-style: normal; font-display: swap;
  }

  :root {
    --merics-red:        #E8412B;
    --merics-red-deep:   #971418;
    --paper:             #F6F3EC;
    --paper-soft:        #FBF8F2;
    --ink:               #1A1916;
    --ink-2:             #2B2A26;
    --graphite:          #51504A;
    --slate:             #7A786F;
    --rule:              #C9C4B6;
    --rule-soft:         #E2DDCD;

    --sans: "Neo Sans Pro", "Helvetica Neue", Arial, sans-serif;
    --serif: "Source Serif Pro", Charter, "Iowan Old Style", "Georgia", "Times New Roman", serif;

    /* One column. Everything aligns to these edges. */
    --read-w: 792px;
    --read-pad: 24px;
  }

  /* ------------------------------------------------------------------ */
  /* Base                                                                */
  /* ------------------------------------------------------------------ */
  *, *::before, *::after { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "kern", "liga";
  }
  ::selection { background: var(--merics-red); color: #fff; }
  a { color: var(--merics-red); text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; transition: color .12s ease; }
  a:hover { color: var(--merics-red-deep); }
  a:visited { color: var(--merics-red-deep); }

  /* ------------------------------------------------------------------ */
  /* Masthead                                                            */
  /* ------------------------------------------------------------------ */
  .topbar {
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: saturate(140%) blur(6px);
  }
  .topbar-inner {
    max-width: var(--read-w);
    margin: 0 auto;
    padding: 0 var(--read-pad);
    display: flex; align-items: center; gap: 14px;
    height: 56px;
    font-family: var(--sans);
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 500; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    flex: 0 0 auto;
  }
  .brand-mark {
    width: 6px; height: 12px;
    background: var(--merics-red);
    display: inline-block;
    transform: skewX(-12deg);
  }
  .brand .name { white-space: nowrap; }

  /* Week switcher — lives in the topbar now */
  .week-switcher {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    min-width: 0;
  }
  .week-title {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: 0;
    line-height: 1;
    white-space: nowrap;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    margin: 0;
    padding: 6px 12px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--paper-soft);
    transition: color .12s ease, border-color .12s ease, background .12s ease;
  }
  .week-title em {
    font-style: normal;
    color: var(--merics-red);
    font-weight: 500;
    margin: 0 2px;
  }
  .week-switcher .chev {
    color: var(--merics-red);
    font-size: 1em;
    line-height: 1;
    margin-left: 10px;
    transition: color .12s ease, transform .15s ease;
    display: inline-block;
    font-weight: 600;
  }
  .week-switcher:hover .chev,
  .week-switcher.is-open .chev { color: var(--merics-red-deep); }
  .week-switcher.is-open .chev { transform: rotate(180deg); }
  .week-switcher:hover .week-title,
  .week-switcher.is-open .week-title {
    color: var(--merics-red-deep);
    border-color: var(--merics-red);
    background: var(--paper);
  }
  /* Native <select> is kept as the canonical source of truth (populated by
     render.js) but visually hidden — the custom panel below drives it. */
  .week-select {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
  /* Custom dropdown panel — replaces the OS-default <select> list so the
     styling matches the rest of the chrome (paper bg, MERICS red, rounded). */
  .week-panel {
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    min-width: 280px;
    max-width: calc(100vw - 24px);
    max-height: 60vh;
    overflow-y: auto;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(26, 25, 22, 0.18);
    padding: 6px;
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity .14s ease, transform .14s ease;
  }
  .week-panel.is-open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .week-panel[hidden] { display: none; }
  .week-option {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    width: 100%;
    text-align: left;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
    line-height: 1.35;
    display: flex;
    align-items: baseline;
    gap: 10px;
    transition: background .1s ease, color .1s ease;
  }
  .week-option .opt-week {
    font-weight: 500;
    color: var(--merics-red);
    min-width: 70px;
  }
  .week-option .opt-range { color: var(--graphite); font-size: 13px; }
  .week-option:hover, .week-option.is-focused {
    background: var(--paper-soft);
    color: var(--ink);
  }
  .week-option.is-current {
    background: rgba(232, 65, 43, 0.08);
  }
  .week-option.is-current .opt-week::after {
    content: " ●";
    color: var(--merics-red);
    font-size: 10px;
    vertical-align: 1px;
  }

  .topbar-actions {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
  }
  .pdf-link {
    font-family: var(--sans);
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    padding: 6px 10px;
    border: 1px solid var(--ink);
    background: transparent;
    transition: background .12s ease, color .12s ease;
    white-space: nowrap;
  }
  .pdf-link:hover { background: var(--ink); color: var(--paper); }
  @media (max-width: 420px) { .pdf-link .full { display: none; } }
  @media (min-width: 421px) { .pdf-link .short { display: none; } }

  /* Print / PDF popover */
  .print-wrap { position: relative; }
  .print-menu {
    position: absolute; top: calc(100% + 8px); right: 0; z-index: 60;
    width: 280px; background: var(--paper); border: 1px solid var(--rule);
    border-radius: 10px; padding: 14px 14px 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,.16); font-family: var(--sans);
  }
  .print-menu[hidden] { display: none; }
  .pm-head { font-weight: 600; font-size: 13px; letter-spacing: .02em; color: var(--ink); }
  .pm-sub { margin: 2px 0 10px; font-size: 11px; color: var(--slate); }
  .pm-row { display: flex; align-items: center; gap: 8px; padding: 5px 4px; font-size: 13px; color: var(--ink); cursor: pointer; border-radius: 6px; }
  .pm-row:hover { background: var(--rule-soft); }
  .pm-row input { accent-color: var(--merics-red); width: 15px; height: 15px; flex: none; }
  .pm-all { font-weight: 600; border-bottom: 1px solid var(--rule-soft); margin-bottom: 4px; padding-bottom: 8px; }
  .pm-parts { display: flex; flex-direction: column; }
  .pm-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .pm-actions button { font-family: var(--sans); font-size: 12px; padding: 7px 12px; border-radius: 7px; cursor: pointer; border: 1px solid var(--rule); background: transparent; color: var(--ink); }
  .pm-cancel:hover { background: var(--rule-soft); }
  .pm-print { background: var(--merics-red); border-color: var(--merics-red); color: #fff; font-weight: 600; }
  .pm-print:hover { filter: brightness(.94); }
  @media (max-width: 480px) { .print-menu { position: fixed; top: 56px; right: 8px; left: 8px; width: auto; } }
  .icon-btn {
    cursor: pointer;
    padding: 6px;
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--ink); color: var(--paper); }
  /* Floating back-to-top button — appears after the user scrolls past the
     masthead. Hidden by default; an inline script toggles .is-visible. */
  .back-to-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    border: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity .18s ease, transform .18s ease, background .12s ease;
    z-index: 25;
    box-shadow: 0 6px 18px rgba(0,0,0,.16);
  }
  .back-to-top.is-visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .back-to-top:hover { background: var(--merics-red); }
  @media (max-width: 540px) { .back-to-top { bottom: 16px; right: 16px; width: 40px; height: 40px; } }
  @media print { .back-to-top { display: none !important; } }
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* ------------------------------------------------------------------ */
  /* Search modal                                                        */
  /* ------------------------------------------------------------------ */
  .search-modal[hidden] { display: none; }
  .search-modal {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 16px 16px;
  }
  .search-backdrop {
    position: absolute; inset: 0;
    background: rgba(26, 25, 22, 0.55);
    backdrop-filter: blur(2px);
  }
  .search-panel {
    position: relative;
    width: 100%;
    max-width: 640px;
    max-height: calc(100vh - 120px);
    background: var(--paper);
    border: 1px solid var(--rule);
    box-shadow: var(--shadow-3, 0 24px 64px rgba(0,0,0,.2));
    display: flex;
    flex-direction: column;
    font-family: var(--sans);
  }
  .search-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--rule);
  }
  .search-icon { flex: 0 0 auto; color: var(--graphite); }
  #searchInput {
    flex: 1 1 auto;
    appearance: none;
    -webkit-appearance: none;
    border: 0;
    background: transparent;
    outline: none;
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.4;
    color: var(--ink);
    padding: 4px 0;
    min-width: 0;
  }
  #searchInput::placeholder { color: var(--slate); }
  .search-close {
    flex: 0 0 auto;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 1px solid var(--rule);
    padding: 4px;
    width: 26px; height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--graphite);
    cursor: pointer;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .search-close:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .search-results {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 0;
  }
  .search-hint, .search-empty {
    padding: 24px 20px;
    color: var(--slate);
    font-size: 13px;
    text-align: center;
    letter-spacing: 0.02em;
  }
  .search-result {
    display: grid;
    grid-template-columns: 22px 1fr;
    column-gap: 12px;
    row-gap: 4px;
    padding: 10px 16px;
    border: 0;
    border-left: 3px solid transparent;
    border-bottom: 1px solid var(--rule-soft);
    background: transparent;
    text-align: left;
    cursor: pointer;
    width: 100%;
    transition: background .1s ease, border-color .1s ease;
  }
  .search-result:hover, .search-result.is-active {
    background: var(--paper-soft);
    border-left-color: var(--merics-red);
  }
  .search-result .outlet-badge { grid-row: 1 / span 2; }
  .search-result .sr-meta {
    grid-column: 2;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: baseline;
    font-size: 11px;
    color: var(--graphite);
    letter-spacing: 0.04em;
  }
  .search-result .sr-week {
    font-weight: 500;
    color: var(--merics-red);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .search-result .sr-crumb { color: var(--slate); }
  .search-result .sr-outlet {
    font-weight: 500;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .search-result .sr-text {
    grid-column: 2;
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.45;
    color: var(--ink-2);
    text-wrap: pretty;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .search-result mark {
    background: rgba(232, 65, 43, 0.18);
    color: inherit;
    font-weight: 600;
    padding: 0 1px;
  }
  .search-foot {
    display: flex;
    gap: 14px;
    padding: 8px 16px;
    border-top: 1px solid var(--rule);
    font-size: 11px;
    color: var(--slate);
    letter-spacing: 0.04em;
  }
  .search-foot kbd {
    font-family: var(--mono, monospace);
    font-size: 10px;
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 1px 5px;
    margin-right: 3px;
  }
  @media (max-width: 540px) {
    .search-modal { padding: 60px 8px 8px; }
    .search-foot { display: none; }
    #searchInput { font-size: 16px; }
  }

  /* ------------------------------------------------------------------ */
  /* (Issue header was removed — week info now lives in the topbar.)     */
  /* ------------------------------------------------------------------ */

  /* ------------------------------------------------------------------ */
  /* Tabs                                                                */
  /* ------------------------------------------------------------------ */
  #nav {
    position: sticky;
    top: 56px; /* below the topbar */
    z-index: 20;
    background: var(--paper);
  }
  .tabs {
    max-width: var(--read-w);
    margin: 0 auto;
    padding: 0 var(--read-pad);
  }
  .tabs-primary {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rule);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    margin: 0;
  }
  .tabs-primary::-webkit-scrollbar { display: none; }
  .tab-btn {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    padding: 14px 14px 12px;
    margin: 0;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--graphite);
    cursor: pointer;
    position: relative;
    white-space: nowrap;
    transition: color .12s ease;
  }
  .tab-btn:first-child { padding-left: 0; }
  .tab-btn + .tab-btn { padding-left: 16px; }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn .tab-num { color: var(--merics-red); margin-right: 6px; font-weight: 500; }
  .tab-btn.is-active { color: var(--ink); }
  .tab-btn.is-active::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: -1px;
    height: 2px;
    background: var(--merics-red);
  }
  .tab-btn:first-child.is-active::after { left: 0; }

  /* Default: show long labels, hide short ones. Mobile media query flips this. */
  .tab-label-short { display: none; }

  /* Filter bar — third row inside the sticky nav. Shows tag chips for the
     currently-visible tab; OR-semantics; resets when tab or week changes. */
  .filter-bar {
    display: none;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .filter-bar.is-open { display: flex; }
  .filter-label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate);
    white-space: nowrap;
    margin-right: 4px;
    flex: 0 0 auto;
  }
  .filter-toggle {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 3px 4px 3px 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate);
    white-space: nowrap;
    flex: 0 0 auto;
    transition: color .12s ease;
  }
  .filter-toggle:hover { color: var(--ink); }
  .filter-toggle .filter-toggle-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    padding: 0 4px;
    height: 14px;
    background: var(--merics-red);
    color: #fff;
    border-radius: 7px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0;
  }
  .filter-toggle .filter-toggle-chev {
    color: var(--graphite);
    font-size: 9px;
    transition: transform .12s ease, color .12s ease;
  }
  .filter-toggle.is-open .filter-toggle-chev { transform: rotate(180deg); color: var(--merics-red); }
  .filter-clear {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--merics-red);
    cursor: pointer;
    padding: 3px 4px;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .filter-clear:hover { color: var(--merics-red-deep); }
  .filter-group-sep {
    display: inline-block;
    width: 1px;
    height: 14px;
    background: var(--rule);
    margin: 0 4px;
    align-self: center;
    flex: 0 0 auto;
  }

  /* Tag chip — used both in the filter bar and under each entry */
  .tag-chip {
    appearance: none;
    -webkit-appearance: none;
    background: var(--paper-soft);
    border: 1px solid var(--rule-soft);
    color: var(--graphite);
    padding: 3px 8px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1.4;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .tag-chip:hover { color: var(--ink); border-color: var(--rule); }
  .tag-chip.is-active {
    background: var(--merics-red);
    color: #fff;
    border-color: var(--merics-red);
  }
  .tag-chip .tag-count {
    margin-left: 5px;
    font-weight: 400;
    color: inherit;
    opacity: 0.65;
    font-size: 9px;
    letter-spacing: 0.02em;
  }
  .entry-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 0 0 14px;
  }
  .entry-tags .tag-chip {
    text-transform: lowercase;
    letter-spacing: 0.02em;
    font-size: 10px;
  }
  .empty-filter {
    margin: 32px 0;
    padding: 18px 16px;
    text-align: center;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--slate);
    letter-spacing: 0.04em;
    border: 1px dashed var(--rule);
  }

  .tabs-sub {
    display: none;
    gap: 0;
    padding: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    border-bottom: 1px solid var(--rule-soft);
  }
  .tabs-sub.is-open { display: flex; }
  .tabs-sub::-webkit-scrollbar { display: none; }
  .chip {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 12px 14px 10px;
    margin: 0;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0;
    color: var(--graphite);
    cursor: pointer;
    white-space: nowrap;
    position: relative;
    transition: color .12s ease;
  }
  .chip:first-child { padding-left: 0; }
  .chip:hover { color: var(--ink); }
  .chip.is-active { color: var(--ink); }
  .chip.is-active::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: -1px;
    height: 2px;
    background: var(--merics-red);
  }
  @media (max-width: 540px) {
    .tab-btn { padding: 14px 12px 12px; font-size: 13px; }
  }

  /* ------------------------------------------------------------------ */
  /* Compact one-line note style — used for German Lens etc. that mirror
     the PDF's terse context tickers. */
  .entry-note {
    padding: 16px 0 6px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .entry-note:last-child { border-bottom: 0; }
  .entry-note .entry-meta { margin-bottom: 8px; }
  .entry-note-text {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.5;
    color: var(--ink-2);
    margin: 0 0 6px;
    text-wrap: pretty;
  }
  @media (max-width: 640px) {
    .entry-note-text { font-size: 16px; }
  }

  /* ------------------------------------------------------------------ */
  /* Top Charts                                                           */
  /* ------------------------------------------------------------------ */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    margin-top: 16px;
  }
  .chart {
    margin: 0;
    background: var(--bg-1);
    border: 1px solid var(--rule-soft);
    padding: 10px;
  }
  .chart img {
    display: block;
    width: 100%;
    height: auto;
  }
  /* Caption sits ABOVE the chart image (placed first in the DOM); body serif
     so it reads as analyst commentary, not a tiny image label. */
  .chart .chart-caption {
    margin: 0 0 10px;
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
    letter-spacing: 0;
  }
  .chart .chart-caption strong { color: var(--ink); }
  /* Supplement (e.g. HS6 reference table) renders below the chart. */
  .chart .chart-supplement { margin-top: 10px; overflow-x: auto; }
  .chart-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink);
  }
  .chart-table th,
  .chart-table td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--rule-soft);
    vertical-align: top;
  }
  .chart-table th { font-weight: 500; color: var(--graphite); }

  /* ------------------------------------------------------------------ */
  /* Wochenbericht (German media review)                                 */
  /* ------------------------------------------------------------------ */
  .wb-caveat {
    font-family: var(--serif);
    font-style: italic;
    color: var(--graphite);
    font-size: 14px;
    margin: 0 0 8px;
    padding: 12px 14px;
    background: rgba(232, 65, 43, 0.06);
    border-left: 3px solid var(--merics-red);
  }
  .wb-item { padding: 20px 0 6px; border-bottom: 1px solid var(--rule-soft); }
  .wb-item:last-child { border-bottom: 0; }
  .wb-text {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0 0 8px;
    text-wrap: pretty;
  }
  .wb-text strong { color: var(--ink); font-weight: 600; }
  .wb-source {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--slate);
    margin: 0;
    letter-spacing: 0.02em;
  }
  .wb-theme {
    padding: 28px 0 12px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .wb-theme:last-child { border-bottom: 0; }
  .wb-theme-title {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 19px;
    color: var(--merics-red-deep);
    line-height: 1.3;
    margin: 0 0 12px;
    text-wrap: balance;
  }
  .wb-theme-text {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink-2);
    margin: 0 0 16px;
    text-wrap: pretty;
  }
  .wb-theme-prom {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--graphite);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--rule-soft);
  }
  .wb-theme-sources { list-style: none; padding: 0; margin: 0; }
  .wb-theme-source {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
    margin: 0 0 8px;
    font-family: var(--sans);
    color: var(--graphite);
  }
  .wb-theme-source .outlet-badge { width: 18px; height: 18px; font-size: 9px; transform: translateY(2px); }
  .wb-theme-source-meta {
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--ink);
    text-transform: uppercase;
    font-size: 11px;
  }
  .wb-theme-source-title {
    color: var(--graphite);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
  }
  @media (max-width: 640px) {
    .wb-text { font-size: 16px; }
    .wb-theme-title { font-size: 17px; }
    .wb-theme-text { font-size: 15px; }
  }

  /* Outlet badge                                                        */
  /* ------------------------------------------------------------------ */
  .outlet-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0;
    flex: 0 0 auto;
    user-select: none;
    overflow: hidden;
  }
  .outlet-badge.has-img { background: var(--paper-soft); }
  .outlet-badge img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .outlet-badge.is-round { border-radius: 50%; }
  .outlet-badge.is-round img { object-fit: cover; }
  .outlet-badge.has-svg svg {
    width: 14px;
    height: 14px;
    display: block;
  }

  .dateline {
    /* Unused now — kept here in case prior styles referenced it. */
    display: none;
  }

  /* ------------------------------------------------------------------ */
  /* Reading column                                                      */
  /* ------------------------------------------------------------------ */
  main {
    max-width: var(--read-w);
    margin: 0 auto;
    padding: 24px var(--read-pad) 96px;
  }

  /* H2: section heading */
  .section {
    margin-top: 32px;
    scroll-margin-top: 100px;
  }
  .section:first-child { margin-top: 16px; }
  .section-h {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 10px;
    margin: 0 0 6px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .section-h .num {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 22px;
    color: var(--merics-red);
    letter-spacing: -0.005em;
    line-height: 1;
    flex: 0 0 auto;
  }
  .section-h .label {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.005em;
    line-height: 1.15;
    color: var(--ink);
    margin: 0;
    text-wrap: balance;
    flex: 1 1 0%;
    min-width: 0;
  }
  .section-note {
    font-family: var(--serif);
    font-style: italic;
    color: var(--graphite);
    font-size: 16px;
    margin: 14px 0 6px;
    line-height: 1.5;
  }
  .section-intro {
    font-family: var(--serif);
    color: var(--ink-2);
    font-size: 18px;
    line-height: 1.55;
    margin: 14px 0 8px;
  }

  .group {
    margin-top: 20px;
  }
  .group-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--graphite);
    margin: 0 0 4px;
    padding: 0;
  }

  /* Spotlight sub-section headings: real visible heading, not a tiny caps label. */
  .spotlight-sub { margin-top: 26px; }
  .spotlight-sub > .spotlight-sub-h {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.005em;
    text-transform: none;
    color: var(--ink);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule-soft);
  }

  /* Spotlight items render as a true bulleted list, not stacked entry cards. */
  .spotlight-bullets {
    list-style: disc outside;
    padding-left: 22px;
    margin: 14px 0 0;
  }
  .spotlight-bullets > li {
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .spotlight-bullets > li:last-child { margin-bottom: 0; }
  .spotlight-bullets > li::marker { color: var(--graphite); }

  /* German China policy items render as a bulleted list. Uses a ::before disc
     (not list-style) so no descendant ul reset can suppress the marker. */
  .context-list { list-style: none; padding: 0; margin: 12px 0 0; }
  .context-list > li { position: relative; padding-left: 22px; margin-bottom: 10px; line-height: 1.5; }
  .context-list > li:last-child { margin-bottom: 0; }
  .context-list > li::before { content: "\2022"; position: absolute; left: 4px; top: 0; color: var(--merics-red); font-weight: 700; }

  /* ------------------------------------------------------------------ */
  /* Article entries                                                     */
  /* ------------------------------------------------------------------ */
  .entry {
    padding: 22px 0 4px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .entry:last-child { border-bottom: 0; }

  /* Entry meta row (badge + outlet + date) */
  .entry-head {
    margin: 0 0 12px;
    font-family: var(--serif);
    line-height: 1.35;
    text-wrap: pretty;
  }
  .entry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .entry-outlet {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .entry-sep {
    font-family: var(--sans);
    color: var(--rule);
    margin: 0 8px;
    font-size: 12px;
    vertical-align: 1px;
  }
  .entry-date {
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--slate);
    text-transform: uppercase;
  }
  .entry-title {
    display: block;
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 600;
    line-height: 1.25;
    margin: 6px 0 0;
    color: var(--ink);
    letter-spacing: -0.005em;
    text-wrap: balance;
  }
  /* Link-only tier (tail) entries: lighter, smaller, no serif bold */
  .entry-link-only .entry-title {
    font-family: var(--sans, system-ui);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.35;
  }
  .entry-link-only { padding: 6px 0; }
  .entry-title-link {
    color: inherit;
    text-decoration: none;
    background-image: linear-gradient(var(--ink), var(--ink));
    background-size: 0% 1px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    transition: background-size .2s ease, color .12s ease;
  }
  .entry-title-link:hover {
    color: var(--merics-red-deep);
    background-image: linear-gradient(var(--merics-red-deep), var(--merics-red-deep));
    background-size: 100% 1px;
  }
  .entry-title .arrow {
    color: var(--merics-red);
    font-family: var(--sans);
    font-weight: 400;
    margin-left: 4px;
    font-size: 0.85em;
  }

  .bullets {
    list-style: none;
    margin: 0 0 14px;
    padding: 0;
  }
  .bullets li {
    position: relative;
    padding-left: 22px;
    margin: 0 0 10px;
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-2);
    text-wrap: pretty;
  }
  .bullets li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.7em;
    width: 10px;
    height: 1px;
    background: var(--merics-red);
  }
  .bullets li b, .bullets li strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* Empty state */
  .empty-state {
    margin: 64px 0;
    padding: 24px 0;
    text-align: center;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--slate);
    letter-spacing: 0.04em;
    border-top: 1px dashed var(--rule);
    border-bottom: 1px dashed var(--rule);
  }

  /* ------------------------------------------------------------------ */
  /* Footer                                                              */
  /* ------------------------------------------------------------------ */
  footer.foot {
    max-width: var(--read-w);
    margin: 0 auto;
    padding: 56px var(--read-pad) 64px;
    border-top: 1px solid var(--rule);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--slate);
  }
  footer.foot a { color: var(--graphite); }
  .foot-meta { color: var(--graphite); margin: 0 0 6px; }
  .foot-meta .sep { color: var(--rule); margin: 0 6px; }
  .foot-note { color: var(--slate); }

  /* ------------------------------------------------------------------ */
  /* ------------------------------------------------------------------ */
  /* Responsive: phone tightening                                        */
  /* ------------------------------------------------------------------ */
  @media (max-width: 640px) {
    :root { --read-pad: 18px; }
    body { font-size: 16px; }
    .topbar-inner { height: 50px; gap: 10px; padding: 0 var(--read-pad); }
    .brand .name { font-size: 10px; letter-spacing: 0.08em; }
    .pdf-link { padding: 5px 8px; font-size: 10px; letter-spacing: 0.06em; }
    .week-title { font-size: 17px; padding: 5px 10px; }

    #nav { top: 50px; }
    .tab-btn { padding: 12px 10px 10px; font-size: 12px; letter-spacing: 0.06em; }
    .tab-btn .tab-num { margin-right: 4px; }
    /* Mobile: use short labels on all tabs so the row never scrolls horizontally. */
    .tab-label-long { display: none; }
    .tab-label-short { display: inline; }
    .tabs-sub { padding: 0; }
    .chip { padding: 10px 10px 8px; font-size: 12px; }
    .chip:first-child { padding-left: 0; }

    .section { margin-top: 36px; scroll-margin-top: 130px; }
    .section-h .num, .section-h .label { font-size: 19px; }
    .section-intro { font-size: 16px; }
    .group { margin-top: 22px; }

    .entry { padding: 18px 0 4px; }
    .entry-title { font-size: 18px; line-height: 1.28; }
    .bullets li { font-size: 16px; padding-left: 18px; }
    .bullets li::before { width: 8px; }
    .outlet-badge { width: 20px; height: 20px; font-size: 9px; }
    .entry-meta { gap: 6px; }
    .entry-outlet { font-size: 11px; letter-spacing: 0.1em; }
    .entry-date { font-size: 11px; }
  }

  @media (max-width: 420px) {
    :root { --read-pad: 14px; }
    .brand .name { display: none; }
    .week-title { font-size: 16px; padding: 5px 9px; }
  }
  /* Scroll fade hint only on the sub-chip row (which may overflow on mobile). */
  .tabs-sub {
    -webkit-mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 22px), transparent 100%);
            mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 22px), transparent 100%);
  }
  /* ------------------------------------------------------------------ */
  /* Skeleton loading state                                              */
  /* ------------------------------------------------------------------ */
  .skeleton .entry-title,
  .skeleton .bullets li {
    color: transparent !important;
    background: linear-gradient(90deg, var(--rule-soft), #efeadf, var(--rule-soft));
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Reduce-motion */
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* Print scaffold hidden on screen until printing. */
  #print-root { display: none; }

  /* Print: only the assembled selection; browser paginates natively. */
  @media print {
    body > *:not(#print-root) { display: none !important; }
    #print-root { display: block !important; }
    body { background: #fff; color: #111; }
    @page { size: A4; margin: 12mm 12mm; }

    /* Cover */
    .print-cover { display: flex; flex-direction: column; justify-content: center; min-height: 235mm; break-after: page; }
    .print-cover .pc-rule { width: 44mm; height: 4px; background: var(--merics-red); margin-bottom: 8mm; }
    .print-doctitle { font: 600 11pt/1 var(--sans); letter-spacing: .14em; text-transform: uppercase; color: var(--merics-red); }
    .print-cover .pc-title { font: 700 30pt/1.1 var(--sans); margin: 6mm 0 4mm; color: #111; }
    .print-cover .pc-range { font: 13pt/1.3 var(--serif); color: #444; }
    .print-cover .pc-toc { margin-top: 8mm; font: 10.5pt/1.7 var(--sans); color: #555; }
    .print-cover .pc-toc .pc-toc-num { color: var(--merics-red); font-weight: 600; display: inline-block; width: 9mm; }
    .print-cover .pc-by { margin-top: 14mm; font: 9.5pt/1.5 var(--sans); color: #888; }

    /* Part heading */
    .print-part { break-before: page; }
    .print-part-h { font: 700 19pt/1.12 var(--sans); margin: 0 0 6mm; padding-bottom: 3mm; border-bottom: 2px solid var(--merics-red); color: #111; }
    .print-part-h .pp-num { color: var(--merics-red); }

    /* Keep logical blocks whole across page breaks */
    .entry, .entry-note, .wb-item, .wb-theme, .spotlight-sub, .research-group, .top-chart, .chart { break-inside: avoid; }
    .section-h, .spotlight-sub-h, .wb-theme-title, .print-part-h { break-after: avoid; }

    /* Paper tidy-ups for the reused entry markup */
    #print-root .section { margin: 0 0 6mm; }
    #print-root .entry { margin: 0 0 4.5mm; }
    #print-root .entry-title-link .arrow { display: none; }
    #print-root .entry-tags, #print-root .filter-bar, #print-root .empty-state { display: none !important; }
    #print-root a { color: #111; text-decoration: none; }
    #print-root img { max-width: 100%; height: auto; }

    /* ---- Density (Safe single-column) + outlet badges that print ---- */
    #print-root { font-size: 10.5pt; line-height: 1.32; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #print-root .pc-rule { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #print-root .outlet-badge { display: none !important; }
    #print-root .entry { margin: 0 0 3mm; }
    #print-root .section { margin: 0 0 4mm; }
    #print-root .entry-title { font-size: 14pt; line-height: 1.2; margin-top: 2px; }
    #print-root .entry-outlet, #print-root .entry-date, #print-root .entry-sep { font-size: 9pt; }
    #print-root .bullets > li, #print-root .context-list > li,
    #print-root .spotlight-bullets > li, #print-root .entry-note-text { font-size: 10.5pt; line-height: 1.3; margin-bottom: 3px; }
    #print-root .section-h { font-size: 13pt; }
    #print-root .spotlight-sub-h { font-size: 12pt; }
    #print-root .print-part-h { font-size: 16pt; margin-bottom: 4mm; }
    #print-root .wb-text { font-size: 11pt; line-height: 1.32; }
    #print-root .wb-theme-title { font-size: 13pt; }
    #print-root .wb-theme-text, #print-root .wb-theme-source-title { font-size: 10.5pt; }
    #print-root .wb-item { padding: 8px 0 4px; }
  }
</style>

  <header class="topbar">

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="sr-only">Search</span>
        </button>
        <div class="print-wrap">
          <button id="printBtn" class="pdf-link" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="printMenu" aria-label="Print or save as PDF">
            <span class="full">Print / PDF &darr;</span>
            <span class="short">PDF &darr;</span>
          </button>

              <button type="button" class="pm-cancel" id="pmCancel">Cancel</button>
              <button type="button" class="pm-print" id="pmPrint">Print &rarr;</button>

  <!-- ============================ DATA + RENDER ========================== -->
  <!-- Manifest-driven loader. The list of weeks lives in data/manifest.json;
       adding a new week is "append to manifest" (or scripts/add_week.py),
       no edit to this file or render.js. Cache-bust string baked here for
       the manifest itself; everything downstream uses manifest.version. -->
  <script>
    (async function () {
      function loadScript(src, version) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src + '?v=' + encodeURIComponent(version);
          s.onload = resolve;
          s.onerror = function () { reject(new Error('Failed to load ' + src)); };
          document.head.appendChild(s);
        });
      }
      try {
        var bootV = '20260527a';
        var m = await fetch('data/manifest.json?v=' + bootV, { cache: 'no-cache' })
          .then(function (r) {
            if (!r.ok) throw new Error('manifest HTTP ' + r.status);
            return r.json();
          });
        var v = m.version || bootV;
        // Order matters: tags + week data + outlets must be defined before render.js
        // runs its WEEKS scan. render.js + search.js have a readyState guard so
        // they init correctly whether DOMContentLoaded has fired or not.
        await loadScript('data/tags.js', v);
        var dataFiles = [];
        (m.weeks || []).forEach(function (w) {
          dataFiles.push('data/' + w.id + '.js');
          if (w.has_wochenbericht) dataFiles.push('data/' + w.id + '-wochenbericht.js');
        });
        await Promise.all(dataFiles.map(function (f) { return loadScript(f, v); }));
        await loadScript('outlets.js', v);
        await loadScript('render.js', v);
        await loadScript('search.js', v);
      } catch (err) {
        var msg = document.createElement('p');
        msg.style.cssText = 'padding:48px 24px;font:14px/1.5 -apple-system,sans-serif;color:#971418;text-align:center';
        msg.textContent = 'Failed to load the archive: ' + (err && err.message ? err.message : err) + '. Try a hard reload (Ctrl+F5).';
        document.body.appendChild(msg);
      }
    })();
  </script>

  <!-- Back-to-top button — appears after 600 px of scroll. Self-contained;
       does not depend on the renderer. -->
  <script>
    (function () {
      var btt = document.getElementById('backToTop');
      if (!btt) return;
      btt.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      var ticking = false;
      function update() {
        ticking = false;
        btt.classList.toggle('is-visible', window.scrollY > 600);
      }
      window.addEventListener('scroll', function () {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(update);
      }, { passive: true });
      update();
    })();
  </script>

  <!-- Custom week-switcher panel. The native <select> stays as the canonical
       source of truth (populated by render.js, consumed by its change handler);
       this panel mirrors its <option> list with styling that matches the
       rest of the chrome. All DOM built with createElement/textContent — no
       innerHTML, so authored option labels can never inject markup. -->
  <script>
    (function () {
      var sw = document.getElementById('weekSwitcher');
      var btn = document.getElementById('weekTitle');
      var sel = document.getElementById('weekSelect');
      var panel = document.getElementById('weekPanel');
      if (!sw || !btn || !sel || !panel) return;

      function clearNode(n) { while (n.firstChild) n.removeChild(n.firstChild); }

      function rebuildPanel() {
        clearNode(panel);
        var opts = Array.prototype.slice.call(sel.options || []);
        if (!opts.length) {
          var empty = document.createElement('div');
          empty.style.cssText = 'padding:12px;color:var(--slate);font-size:13px';
          empty.textContent = 'No weeks loaded yet.';
          panel.appendChild(empty);
          return;
        }
        opts.forEach(function (o) {
          var raw = o.textContent || '';
          var parts = raw.split('—');
          var week = (parts[0] || raw).trim();
          var range = (parts[1] || '').trim();
          var current = (o.value === sel.value);
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'week-option' + (current ? ' is-current' : '');
          b.setAttribute('role', 'option');
          b.setAttribute('data-value', o.value);
          b.setAttribute('aria-selected', current ? 'true' : 'false');
          var wEl = document.createElement('span');
          wEl.className = 'opt-week';
          wEl.textContent = week;
          b.appendChild(wEl);
          if (range) {
            var rEl = document.createElement('span');
            rEl.className = 'opt-range';
            rEl.textContent = range;
            b.appendChild(rEl);
          }
          b.addEventListener('click', function () {
            var v = b.getAttribute('data-value');
            if (v && v !== sel.value) {
              sel.value = v;
              sel.dispatchEvent(new Event('change', { bubbles: true }));
            }
            closePanel();
          });
          panel.appendChild(b);
        });
      }
      function isOpen() { return panel.classList.contains('is-open'); }
      function openPanel() {
        rebuildPanel();
        panel.hidden = false;
        requestAnimationFrame(function () {
          panel.classList.add('is-open');
          sw.classList.add('is-open');
          btn.setAttribute('aria-expanded', 'true');
        });
      }
      function closePanel() {
        panel.classList.remove('is-open');
        sw.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        setTimeout(function () { if (!panel.classList.contains('is-open')) panel.hidden = true; }, 180);
      }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (isOpen()) closePanel(); else openPanel();
      });
      document.addEventListener('click', function (e) {
        if (isOpen() && !sw.contains(e.target)) closePanel();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && isOpen()) closePanel();
      });
    })();
  </script>
</body>
</html>
